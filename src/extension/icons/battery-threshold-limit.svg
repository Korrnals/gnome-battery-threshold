<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Battery body -->
  <rect x="1" y="4.5" width="11.5" height="7" rx="1" fill="none" stroke="#9a9996" stroke-width="1.4"/>
  <!-- Terminal nub -->
  <rect x="12.5" y="6.25" width="1.6" height="3.5" rx="0.4" fill="#9a9996"/>
  <!-- Blue full fill (at limit) -->
  <rect x="2.2" y="5.6" width="9.1" height="4.8" rx="0.4" fill="#62a0ea"/>
  <!-- Power-plug badge top-right -->
  <circle cx="12.5" cy="3.5" r="3" fill="#1d1d1d"/>
  <!-- Plug prongs -->
  <rect x="11.3" y="1.4" width="0.7" height="1.5" rx="0.2" fill="#ffffff"/>
  <rect x="13.0" y="1.4" width="0.7" height="1.5" rx="0.2" fill="#ffffff"/>
  <!-- Plug body -->
  <rect x="10.8" y="2.9" width="3.4" height="1.6" rx="0.3" fill="#ffffff"/>
  <!-- Cable -->
  <rect x="12.2" y="4.5" width="0.6" height="1.1" fill="#ffffff"/>
</svg>
