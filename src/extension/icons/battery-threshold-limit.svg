<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Battery body (hollow) -->
  <rect x="2" y="5" width="10" height="6" rx="0.9" ry="0.9" fill="none" stroke="#62a0ea" stroke-width="1"/>
  <!-- Positive terminal -->
  <rect x="12.6" y="6.75" width="1.4" height="2.5" rx="0.4" ry="0.4" fill="#62a0ea"/>
  <!-- Filled allowed range: middle 2 of 4 cells -->
  <rect x="5.2" y="6.2" width="3.6" height="3.6" fill="#62a0ea" opacity="0.78"/>
  <!-- Faint divider between cell 2 and cell 3 -->
  <line x1="7" y1="6.4" x2="7" y2="9.6" stroke="#62a0ea" stroke-width="0.35" opacity="0.35"/>
  <!-- Dashed threshold limit markers (thinner, crisper dashes) -->
  <line x1="5.2" y1="2.8" x2="5.2" y2="13.2" stroke="#62a0ea" stroke-width="0.6" stroke-dasharray="1.6 1.3"/>
  <line x1="8.8" y1="2.8" x2="8.8" y2="13.2" stroke="#62a0ea" stroke-width="0.6" stroke-dasharray="1.6 1.3"/>
</svg>