name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust (${{ matrix.os }} / ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        toolchain: [stable, "1.75"]   # MSRV
        exclude:
          # MSRV only needs to be tested on latest Ubuntu
          - os: ubuntu-22.04
            toolchain: "1.75"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: ${{ matrix.toolchain == 'stable' && 'rustfmt, clippy' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/daemon -> target
          key: ${{ matrix.os }}-${{ matrix.toolchain }}

      - name: Format check
        if: matrix.toolchain == 'stable'
        run: cargo fmt --manifest-path src/daemon/Cargo.toml --all -- --check

      - name: Clippy
        if: matrix.toolchain == 'stable'
        run: cargo clippy --manifest-path src/daemon/Cargo.toml --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --manifest-path src/daemon/Cargo.toml --all-features

      - name: Release build
        run: cargo build --manifest-path src/daemon/Cargo.toml --release --locked

      - uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest' && matrix.toolchain == 'stable'
        with:
          name: battery-thresholdd
          path: src/daemon/target/release/battery-thresholdd
          retention-days: 7

  extension:
    name: Extension (lint + package)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GLib tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev-bin zip

      - name: Validate metadata.json
        run: python3 -c "import json,sys; json.load(open('src/extension/metadata.json')); print('OK')"

      - name: Build extension bundle
        run: make extension

      - name: Package as zip
        run: make dist

      - uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: dist/*.zip
          retention-days: 7

  # ─── Smoke test: install on a real distro ───────────────────────────────────
  install-fedora:
    name: Install smoke test (Fedora)
    runs-on: ubuntu-latest
    needs: [rust]
    container:
      image: fedora:43
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: dnf install -y rust cargo glib2-devel make systemd dbus-devel
      - name: Build
        run: make build
      - name: Dry-run install to staging dir
        run: |
          make install-system install-extension \
              DESTDIR="$PWD/stage" PREFIX=/usr SYSCONFDIR=/etc \
              REAL_HOME=/tmp/home EXTENSION_DIR=/tmp/home/extension
          ls -R stage/

  install-ubuntu:
    name: Install smoke test (Ubuntu)
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev-bin cargo make systemd dbus
      - name: Build
        run: make build
      - name: Dry-run install to staging dir
        run: |
          make install-system install-extension \
              DESTDIR="$PWD/stage" PREFIX=/usr SYSCONFDIR=/etc \
              REAL_HOME=/tmp/home EXTENSION_DIR=/tmp/home/extension
          ls -R stage/

  # ─── Distro packages (tags only) ────────────────────────────────────────────
  package-rpm:
    name: Build RPM (Fedora)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    container:
      image: fedora:43
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          dnf install -y rust cargo glib2-devel make systemd dbus-devel \
                         rpm-build rpmdevtools zip git tar
      - name: Build RPM
        run: make package-rpm
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: dist/*.rpm
          retention-days: 7

  package-deb:
    name: Build DEB (Ubuntu)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev-bin cargo make systemd dbus \
                                   dpkg-dev fakeroot zip
      - name: Build DEB
        run: make package-deb
      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: dist/*.deb
          retention-days: 7

  release:
    name: Release
    needs: [rust, extension, install-fedora, install-ubuntu, package-rpm, package-deb]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: battery-thresholdd
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: rpm-package
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.rpm
            dist/*.deb
            dist/battery-thresholdd
          generate_release_notes: true
          fail_on_unmatched_files: true