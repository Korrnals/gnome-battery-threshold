name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust (fmt, clippy, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/daemon -> target

      - name: Format check
        run: cargo fmt --manifest-path src/daemon/Cargo.toml --all -- --check

      - name: Clippy
        run: cargo clippy --manifest-path src/daemon/Cargo.toml --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --manifest-path src/daemon/Cargo.toml --all-features

      - name: Release build
        run: cargo build --manifest-path src/daemon/Cargo.toml --release --locked

      - uses: actions/upload-artifact@v4
        with:
          name: battery-thresholdd
          path: src/daemon/target/release/battery-thresholdd
          retention-days: 7

  extension:
    name: Extension (lint + package)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GLib tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev-bin zip

      - name: Validate metadata.json
        run: python3 -c "import json,sys; json.load(open('src/extension/metadata.json')); print('OK')"

      - name: Build extension bundle
        run: make extension

      - name: Package as zip
        run: make dist

      - uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: dist/*.zip
          retention-days: 7

  release:
    name: Release
    needs: [rust, extension]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: battery-thresholdd
          path: dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/battery-thresholdd
          generate_release_notes: true
          fail_on_unmatched_files: true