name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        dnf install -y git meson sassc glib2-devel gtk4-devel libadwaita-devel cargo python3 gnome-shell unzip zip
    
    - name: Validate extension metadata
      run: |
        python3 -c "import json; json.load(open('metadata.json'))"
        echo "✓ metadata.json is valid"
    
    - name: Build Rust backend
      run: |
        cd battery-thresholdd
        cargo build --release
        cd ..
    
    - name: Build extension
      run: |
        ./build.sh
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: extension-zip
        path: dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: extension-zip
        path: dist/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Требуется API ключ, который можно получить на сайте
        echo "Publishing to GNOME Extensions..."
        # curl -X POST -F "file=@battery-threshold@Korrnals.dev-v2.zip" -H "Authorization: Token $API_KEY" https://extensions.gnome.org/upload/