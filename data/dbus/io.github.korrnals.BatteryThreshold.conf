<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!--
    Only root may own the bus name. Any local user may invoke methods;
    the daemon enforces fine-grained authorization via PolicyKit (see
    data/policy/io.github.korrnals.BatteryThreshold.policy).
  -->

  <policy user="root">
    <allow own="io.github.korrnals.BatteryThreshold"/>
  </policy>

  <policy context="default">
    <allow send_destination="io.github.korrnals.BatteryThreshold"
           send_interface="io.github.korrnals.BatteryThreshold1"/>
    <allow send_destination="io.github.korrnals.BatteryThreshold"
           send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_destination="io.github.korrnals.BatteryThreshold"
           send_interface="org.freedesktop.DBus.Introspectable"/>
  </policy>
</busconfig>
