<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
    <linearGradient id="battery_fill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="40" x2="860" y2="40"/>
    <line x1="0" y1="80" x2="860" y2="80"/>
    <line x1="0" y1="120" x2="860" y2="120"/>
    <line x1="0" y1="160" x2="860" y2="160"/>
    <line x1="172" y1="0" x2="172" y2="200"/>
    <line x1="344" y1="0" x2="344" y2="200"/>
    <line x1="516" y1="0" x2="516" y2="200"/>
    <line x1="688" y1="0" x2="688" y2="200"/>
  </g>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="860" height="3" fill="url(#accent)" rx="12"/>

  <!-- Battery icon group (left side) -->
  <g transform="translate(52, 60)">
    <!-- Battery body -->
    <rect x="0" y="8" width="72" height="44" rx="6" fill="none" stroke="#4ade80" stroke-width="2.5" filter="url(#glow)"/>
    <!-- Battery terminal -->
    <rect x="72" y="19" width="8" height="22" rx="3" fill="#4ade80" opacity="0.8"/>
    <!-- Battery fill (70%) -->
    <rect x="4" y="12" width="44" height="36" rx="4" fill="url(#battery_fill)" opacity="0.9"/>
    <!-- Bolt symbol -->
    <text x="36" y="36" font-size="22" text-anchor="middle" fill="white" font-weight="bold" opacity="0.95">⚡</text>
  </g>

  <!-- Rust crab icon area -->
  <g transform="translate(52, 130)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="#ce422b" opacity="0.2"/>
    <text x="40" y="19" font-size="13" text-anchor="middle" fill="#f46832" font-weight="600" font-family="monospace">🦀 Rust</text>
  </g>

  <!-- Title -->
  <text x="168" y="72" font-size="38" font-weight="700" fill="white"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        filter="url(#textglow)">Battery Threshold</text>

  <!-- Accent underline under title -->
  <rect x="168" y="80" width="320" height="3" fill="url(#accent)" rx="2"/>

  <!-- Subtitle -->
  <text x="168" y="110" font-size="16" fill="#94a3b8"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    GNOME Shell Extension  ·  Keep your battery healthy. Set it. Forget it.
  </text>

  <!-- Feature pills -->
  <g transform="translate(168, 130)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="96" height="26" rx="13" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="48" y="17" font-size="12" text-anchor="middle" fill="#60a5fa" font-family="monospace">sysfs backend</text>

    <!-- Pill 2 -->
    <rect x="106" y="0" width="104" height="26" rx="13" fill="#1e3a5f" stroke="#8b5cf6" stroke-width="1"/>
    <text x="158" y="17" font-size="12" text-anchor="middle" fill="#a78bfa" font-family="monospace">PolicyKit auth</text>

    <!-- Pill 3 -->
    <rect x="220" y="0" width="100" height="26" rx="13" fill="#1e3a5f" stroke="#22c55e" stroke-width="1"/>
    <text x="270" y="17" font-size="12" text-anchor="middle" fill="#4ade80" font-family="monospace">systemd unit</text>

    <!-- Pill 4 -->
    <rect x="330" y="0" width="96" height="26" rx="13" fill="#1e3a5f" stroke="#f59e0b" stroke-width="1"/>
    <text x="378" y="17" font-size="12" text-anchor="middle" fill="#fbbf24" font-family="monospace">D-Bus API</text>
  </g>

  <!-- Right side: version + author -->
  <g transform="translate(720, 60)">
    <text x="70" y="0" font-size="13" text-anchor="middle" fill="#475569"
          font-family="monospace">v1.0.0</text>
    <text x="70" y="22" font-size="13" text-anchor="middle" fill="#475569"
          font-family="monospace">GPL-3.0</text>
  </g>

  <!-- Author tag bottom right -->
  <text x="840" y="185" font-size="12" text-anchor="end" fill="#334155"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">by Korrnals</text>

  <!-- Decorative circles -->
  <circle cx="800" cy="60" r="40" fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.5"/>
  <circle cx="800" cy="60" r="28" fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.4"/>
  <circle cx="800" cy="60" r="16" fill="#0f3460" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <text x="800" y="65" font-size="14" text-anchor="middle" fill="#60a5fa" opacity="0.9">⚙</text>

  <!-- Accent bar bottom -->
  <rect x="0" y="197" width="860" height="3" fill="url(#accent)" rx="12"/>
</svg>
